services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: plantation-db
    environment:
      POSTGRES_DB: plantation
      POSTGRES_USER: plantation_user
      POSTGRES_PASSWORD: plantation_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plantation_user -d plantation"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: plantation-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plantation-backend
    environment:
      DATABASE_URL: postgresql://plantation_user:plantation_pass@postgres:5432/plantation
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: plantation-jwt-secret-change-in-prod
      UPLOAD_DIR: /app/uploads
      TILES_DIR: /app/tiles
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
      - tiles:/app/tiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: plantation-celery
    command: celery -A app.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://plantation_user:plantation_pass@postgres:5432/plantation
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      TILES_DIR: /app/tiles
    volumes:
      - uploads:/app/uploads
      - tiles:/app/tiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: plantation-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  tiles:
